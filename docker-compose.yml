services:
  app:
    image: alpine:3.20
    command: ["sh","-c","echo 'auth-service-go-postgres app container ready'; sleep infinity"]
    ports:
      - "3000:3000"
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=appdb
    ports:
      - "5432:5432"
